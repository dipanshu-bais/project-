<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Tweet Analyzer | Pro Version</title>
    <style>
        :root {
            --primary: #ff4b4b;
            --dark: #0e1117;
            --card-bg: #161b22;
            --text: #ffffff;
            --success: #28a745;
            --warning: #ffc107;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 5px solid var(--primary);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 28px;
        }

        .badge {
            background: #30363d;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            display: inline-block;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #0d1117;
            border: 2px solid #30363d;
            border-radius: 10px;
            color: white;
            padding: 15px;
            box-sizing: border-box;
            font-size: 16px;
            resize: none;
            transition: 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(255, 75, 75, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #d32f2f;
            transform: translateY(-2px);
        }

        /* Results */
        #result-box {
            margin-top: 30px;
            display: none;
            padding: 20px;
            border-radius: 10px;
            animation: slideUp 0.4s ease;
        }

        .emergency { background: rgba(255, 75, 75, 0.1); border: 1px solid var(--primary); color: #ff8080; }
        .safe { background: rgba(40, 167, 69, 0.1); border: 1px solid var(--success); color: #80ff9f; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: none;
            margin: 20px auto;
            border: 4px solid #30363d;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🚨 Disaster Relief AI</h1>
        <div class="badge">Standalone Browser Edition</div>
    </div>

    <div class="input-group">
        <label style="color: #888; font-weight: bold; display: block; margin-bottom: 8px;">Tweet Content:</label>
        <textarea id="tweetInput" placeholder="E.g. Building collapsed in Delhi, people are trapped!"></textarea>
    </div>

    <button onclick="analyzeTweet()">Analyze with Local AI Logic</button>

    <div id="loader" class="loader"></div>

    <div id="result-box">
        <h2 id="status-title" style="margin-top: 0;"></h2>
        <p id="status-desc"></p>
        <div class="stats-grid">
            <div style="color: #888;">Confidence: <b id="conf-val" style="color: white;">0%</b></div>
            <div style="color: #888;">Severity: <b id="sev-val" style="color: white;">N/A</b></div>
        </div>
    </div>
</div>

<script>
    function analyzeTweet() {
        const input = document.getElementById('tweetInput').value.trim();
        const resultBox = document.getElementById('result-box');
        const loader = document.getElementById('loader');
        
        if (!input) {
            alert("Bhai, kuch text toh dalo!");
            return;
        }

        resultBox.style.display = "none";
        loader.style.display = "block";

        // Fake processing delay (feels more professional)
        setTimeout(() => {
            loader.style.display = "none";
            resultBox.style.display = "block";

            // Advanced Keyword matching (Simulating NLP)
            const text = input.toLowerCase();
            const highRisk = ['earthquake', 'flood', 'tsunami', 'fire', 'collapsed', 'trapped', 'explosion', 'killed', 'cyclone'];
            const mediumRisk = ['help', 'injury', 'accident', 'smoke', 'warning', 'storm'];

            let score = 0;
            highRisk.forEach(word => { if(text.includes(word)) score += 40; });
            mediumRisk.forEach(word => { if(text.includes(word)) score += 20; });

            // Random variation for realism
            score = Math.min(score + Math.floor(Math.random() * 15), 99);

            if (score > 35) {
                resultBox.className = "emergency";
                document.getElementById('status-title').innerHTML = "🚨 DISASTER DETECTED";
                document.getElementById('status-desc').innerHTML = "High probability of a real-world emergency event. Authorities notified (Simulated).";
                document.getElementById('conf-val').innerText = score + "%";
                document.getElementById('sev-val').innerText = score > 70 ? "CRITICAL" : "MODERATE";
            } else {
                resultBox.className = "safe";
                document.getElementById('status-title').innerHTML = "✅ STATUS NORMAL";
                document.getElementById('status-desc').innerHTML = "This text appears to be a casual update or non-critical information.";
                document.getElementById('conf-val').innerText = (100 - score) + "% (Safe)";
                document.getElementById('sev-val').innerText = "LOW";
            }
        }, 800);
    }
</script>

</body>
</html>
